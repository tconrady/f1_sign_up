<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

function f1img(team, code) {

}

// ── Data ──────────────────────────────────────────────────────────────────
const TEAM_COLORS = {
  "Red Bull":"#3671c6","Mercedes":"#00d2be","Ferrari":"#e8002d",
  "McLaren":"#ff8000","Williams":"#64c4ff","Alpine":"#0093cc",
  "Haas":"#b6babd","Audi":"#e4002c","Racing Bulls":"#6692ff",
  "Aston Martin":"#358c75","Cadillac":"#a7a7a7",
};

function seededShuffle(arr, seed) {
  const a = [...arr]; let s = seed;
  for (let i = a.length-1; i > 0; i--) {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    const j = Math.abs(s) % (i+1);
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

const POOL_A_BASE = [

  { name:"Pierre Gasly",      team:"Alpine",       flag:"🇫🇷", avg:"9.7",  number:10, img:f1img("alpine","piegas01") },
  { name:"Fernando Alonso",   team:"Aston Martin", flag:"🇪🇸", avg:"10.8", number:14, img:f1img("astonmartin","feralo01") },
];
const POOL_B_BASE = [
  { name:"Alex Albon",        team:"Williams",     flag:"🇹🇭", avg:"12.0", number:23, img:f1img("williams","alealb01") },
  { name:"Nico Hülkenberg",   team:"Audi",         flag:"🇩🇪", avg:"13.0", number:27, img:f1img("audi","nichul01") },
  { name:"Gabriel Bortoleto", team:"Audi",         flag:"🇧🇷", avg:"14.0", number:5,  img:f1img("audi","gabbor01") },
  { name:"Esteban Ocon",      team:"Haas",         flag:"🇫🇷", avg:"14.8", number:31, img:f1img("haas","estoco01") },
  { name:"Franco Colapinto",  team:"Alpine",       flag:"🇦🇷", avg:"16.5", number:43, img:f1img("alpine","fracol01") },
  { name:"Liam Lawson",       team:"Racing Bulls", flag:"🇳🇿", avg:"16.8", number:30, img:f1img("racingbulls","lialaw01") },
  { name:"Arvid Lindblad",    team:"Racing Bulls", flag:"🇬🇧", avg:"17.5", number:41, img:f1img("racingbulls","arvlin01") },
  { name:"Oliver Bearman",    team:"Haas",         flag:"🇬🇧", avg:"17.8", number:87, img:f1img("haas","olibea01") },
  { name:"Lance Stroll",      team:"Aston Martin", flag:"🇨🇦", avg:"19.8", number:18, img:f1img("astonmartin","lanstr01") },
  { name:"Valtteri Bottas",   team:"Cadillac",     flag:"🇫🇮", avg:"20.2", number:77, img:f1img("cadillac","valbot01") },
  { name:"Sergio Pérez",      team:"Cadillac",     flag:"🇲🇽", avg:"21.2", number:11, img:f1img("cadillac","serper01") },
];

const POOL_A    = seededShuffle(POOL_A_BASE, 20260308);
const POOL_B    = seededShuffle(POOL_B_BASE, 20260309);
const ALL       = [...POOL_A_BASE, ...POOL_B_BASE];

const PLAYERS_R1 = ["Alyssa","Nora","Jay","Margaret","Cecelia","Charlie","Sarah","Timo","Mary Beth","David","Jane"];
const PLAYERS_R2 = ["Jane","David","Mary Beth","Timo","Sarah","Charlie","Cecelia","Margaret","Jay","Nora","Alyssa"];
const PICK_ORDER = [
  ...PLAYERS_R1.map((p,i) => ({ pickNum:i+1,  round:1, player:p, pool:"A" })),
  ...PLAYERS_R2.map((p,i) => ({ pickNum:i+12, round:2, player:p, pool:"B" })),
];

// ── JSONBin storage ───────────────────────────────────────────────────────
const { BIN_ID, ACCESS_KEY, POLL_MS } = window.DRAFT_CONFIG;
const NOT_CONFIGURED = BIN_ID === "YOUR_BIN_ID_HERE";
const JSONBIN_BASE   = "https://api.jsonbin.io/v3";

// JSONBin has two separate bins: one for live, one for test
// We use a simple convention: store {live:{...}, test:{...}} in one bin
async function binLoad() {
  if (NOT_CONFIGURED) {
    const raw = localStorage.getItem("f1_draft_2026");
    return raw ? JSON.parse(raw) : { live:{ picks:{}, started:false }, test:{ picks:{}, started:false } };
  }
  try {
    const r = await fetch(`${JSONBIN_BASE}/b/${BIN_ID}/latest`, {
      headers: { "X-Access-Key": ACCESS_KEY }
    });
    const data = await r.json();
    return data.record ?? { live:{ picks:{}, started:false }, test:{ picks:{}, started:false } };
  } catch {
    return { live:{ picks:{}, started:false }, test:{ picks:{}, started:false } };
  }
}

async function binSave(record) {
  if (NOT_CONFIGURED) {
    localStorage.setItem("f1_draft_2026", JSON.stringify(record));
    return;
  }
  try {
    await fetch(`${JSONBIN_BASE}/b/${BIN_ID}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json", "X-Access-Key": ACCESS_KEY },
      body: JSON.stringify(record)
    });
  } catch {}
}

// ── Driver Card ───────────────────────────────────────────────────────────
function DriverCard({ driver, selected, onSelect, picked }) {
  const tc = TEAM_COLORS[driver.team] || "#888";
  const [imgFailed, setImgFailed] = useState(false);
  return (
    <div
      onClick={() => !picked && onSelect(driver.name)}
      style={{
        background: picked ? "#0a0a12" : selected ? tc+"18" : "#0d0d1a",
        border: `2px solid ${picked ? "#1a1a2a" : selected ? tc : "#1e1e2e"}`,
        borderRadius:10, overflow:"hidden", position:"relative",
        cursor: picked ? "default" : "pointer",
        transition:"all 0.15s", opacity: picked ? 0.35 : 1,
        boxShadow: selected && !picked ? `0 0 18px ${tc}33` : "none",
      }}
    >
      <div style={{ width:"100%", aspectRatio:"1/1", overflow:"hidden", position:"relative", background:`linear-gradient(160deg,${tc}33 0%,#0a0a14 60%)` }}>
        {!imgFailed ? (
          <img src={driver.img} alt={driver.name}
            style={{ width:"100%", height:"100%", objectFit:"cover", objectPosition:"top center", display:"block", filter:picked?"grayscale(1) opacity(0.4)":"none", transition:"filter 0.2s" }}
            onError={() => setImgFailed(true)}
          />
        ) : (
          <div style={{ width:"100%", height:"100%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:52 }}>{driver.flag}</div>
        )}
        <div style={{ position:"absolute", top:7, right:9, fontSize:12, fontWeight:800, color:picked?"#333":tc, fontFamily:"monospace", textShadow:picked?"none":`0 0 10px ${tc}` }}>
          #{driver.number}
        </div>
        {picked && (
          <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", background:"#00000099", fontSize:28 }}>✓</div>
        )}
        {selected && !picked && (
          <div style={{ position:"absolute", inset:0, border:`2px solid ${tc}`, borderRadius:8, pointerEvents:"none" }}/>
        )}
      </div>
      <div style={{ padding:"9px 11px 11px" }}>
        <div style={{ fontSize:11, fontWeight:700, color:picked?"#445":"#fff", lineHeight:1.25, marginBottom:5 }}>{driver.name}</div>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:4 }}>
          <span style={{ fontSize:8, padding:"2px 6px", borderRadius:3, background:tc+(picked?"11":"22"), border:`1px solid ${tc}${picked?"22":"66"}`, color:picked?"#556":tc, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", maxWidth:"72%" }}>{driver.team}</span>
          <span style={{ fontSize:8, color:picked?"#2a2a3a":"#4a5568" }}>#{driver.avg}</span>
        </div>
      </div>
    </div>
  );
}

// ── Setup screen ──────────────────────────────────────────────────────────
function SetupScreen({ onBack }) {
  return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
      <div style={{ maxWidth:580, width:"100%", background:"#0d0d1a", border:"1px solid #1e1e2e", borderRadius:12, padding:28 }}>
        {onBack && <button onClick={onBack} style={{ background:"transparent", border:"1px solid #2a2a3a", color:"#64748b", borderRadius:4, padding:"4px 10px", fontSize:10, cursor:"pointer", marginBottom:20 }}>← Back</button>}
        <div style={{ fontSize:8, letterSpacing:5, color:"#e8002d", marginBottom:6 }}>SETUP</div>
        <h2 style={{ fontSize:18, fontWeight:700, color:"#fff", marginBottom:16 }}>Connect to JSONBin</h2>
        <div style={{ display:"flex", flexDirection:"column", gap:12, marginBottom:20 }}>
          {[
            { n:"1", text:"Go to", link:"jsonbin.io", href:"https://jsonbin.io", rest:" and create a free account" },
            { n:"2", text:'Click "API Keys" → "Create Access Key" → copy it' },
            { n:"3", text:'Click "New Bin" → paste ', code:"{}", rest:' as content → make it Private → Create' },
            { n:"4", text:"Copy the Bin ID from the response or URL" },
            { n:"5", text:"Open ", code:"index.html", rest:", find DRAFT_CONFIG at the top, and paste both values in" },
            { n:"6", text:"Save the file, push to your GitHub repo, done 🏁" },
          ].map(({ n, text, link, href, rest, code }) => (
            <div key={n} style={{ display:"flex", gap:12, alignItems:"flex-start" }}>
              <div style={{ width:22, height:22, borderRadius:"50%", background:"#e8002d22", border:"1px solid #e8002d44", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, color:"#e8002d", flexShrink:0, marginTop:1 }}>{n}</div>
              <div style={{ fontSize:12, color:"#94a3b8", lineHeight:1.6 }}>
                {text}
                {link && <a href={href} target="_blank" style={{ color:"#64c4ff" }}>{link}</a>}
                {code && <code style={{ background:"#1e1e2e", padding:"1px 5px", borderRadius:3, color:"#ffd700", fontSize:11 }}>{code}</code>}
                {rest}
              </div>
            </div>
          ))}
        </div>
        <div style={{ background:"#0a1000", border:"1px solid #22c55e22", borderRadius:8, padding:14, fontSize:11, color:"#86efac", lineHeight:1.7 }}>
          <strong>Is it safe?</strong> Your Access Key can only read/write bins on your JSONBin account — nothing else. Make the bin <strong>Private</strong> so only requests with your key can read it (the app sends the key, your players don't need to do anything). Worst case: someone who finds the key can only mess with a draft JSON file.
        </div>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────
function App() {
  const [record, setRecord]         = useState(null); // full bin: {live, test}
  const [loading, setLoading]       = useState(true);
  const [selected, setSelected]     = useState(null);
  const [view, setView]             = useState("board");
  const [flash, setFlash]           = useState(null);
  const [saving, setSaving]         = useState(false);
  const [testMode, setTestMode]     = useState(false);
  const [showSetup, setShowSetup]   = useState(false);
  const prevPickCount               = useRef(0);

  const draft    = record ? (testMode ? record.test : record.live) : { picks:{}, started:false };
  const draftKey = testMode ? "test" : "live";

  const load = useCallback(async () => {
    const rec = await binLoad();
    setRecord(rec);
    const d = testMode ? rec.test : rec.live;
    prevPickCount.current = Object.keys(d?.picks ?? {}).length;
    setLoading(false);
  }, [testMode]);

  useEffect(() => { setLoading(true); setSelected(null); setFlash(null); load(); }, [testMode]);

  // Poll for remote picks
  useEffect(() => {
    const iv = setInterval(async () => {
      const fresh = await binLoad();
      const freshDraft = testMode ? fresh.test : fresh.live;
      const newCount   = Object.keys(freshDraft?.picks ?? {}).length;
      if (newCount > prevPickCount.current) {
        const currentPicks = draft?.picks ?? {};
        const newPn = Object.keys(freshDraft.picks).find(k => !currentPicks[k]);
        if (newPn) {
          const po = PICK_ORDER[Number(newPn)-1];
          showFlash({ player:po.player, driver:freshDraft.picks[newPn], pool:po.pool, remote:true });
        }
        setRecord(fresh);
        prevPickCount.current = newCount;
      }
    }, POLL_MS);
    return () => clearInterval(iv);
  }, [testMode, draft]);

  function showFlash(data) {
    setFlash(data);
    setTimeout(() => setFlash(null), 4500);
  }

  const pickedDrivers = new Set(Object.values(draft?.picks ?? {}));
  const nextPick      = PICK_ORDER.find(p => !draft?.picks?.[p.pickNum]) ?? null;
  const isDone        = Object.keys(draft?.picks ?? {}).length === PICK_ORDER.length;
  const currentPool   = nextPick?.pool === "A" ? POOL_A : POOL_B;
  const madeNums      = Object.keys(draft?.picks ?? {}).map(Number).sort((a,b)=>b-a);
  const pct           = Math.round(Object.keys(draft?.picks ?? {}).length / PICK_ORDER.length * 100);
  const T             = TEAM_COLORS;

  async function makePick(name) {
    if (!nextPick || !name || saving || !record) return;
    setSaving(true);
    const newDraft  = { picks:{ ...draft.picks, [nextPick.pickNum]:name }, started:true };
    const newRecord = { ...record, [draftKey]:newDraft };
    setRecord(newRecord);
    prevPickCount.current = Object.keys(newDraft.picks).length;
    await binSave(newRecord);
    setSaving(false);
    showFlash({ player:nextPick.player, driver:name, pool:nextPick.pool });
    setSelected(null);
  }

  async function handleReset() {
    if (!confirm(testMode ? "Clear all test picks?" : "Reset the REAL draft? Cannot be undone.")) return;
    const empty     = { picks:{}, started:false };
    const newRecord = { ...record, [draftKey]:empty };
    setRecord(newRecord);
    prevPickCount.current = 0;
    await binSave(newRecord);
    setSelected(null); setFlash(null);
  }

  function getPlayerPicks(player) {
    const r1 = PICK_ORDER.find(p => p.player===player && p.round===1);
    const r2 = PICK_ORDER.find(p => p.player===player && p.round===2);
    return { a: r1 ? draft.picks?.[r1.pickNum] : null, b: r2 ? draft.picks?.[r2.pickNum] : null };
  }

  if (showSetup) return <SetupScreen onBack={() => setShowSetup(false)} />;

  if (loading) return (
    <div style={{ height:"100vh", display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ color:"#e8002d", fontSize:13, letterSpacing:5, animation:"pulse 1.2s infinite" }}>LOADING DRAFT…</div>
    </div>
  );

  const isTest = testMode;
  const accent = isTest ? "#22c55e" : "#e8002d";

  return (
    <div style={{ minHeight:"100vh", background:"#07070f" }}>

      {/* ── HEADER ── */}
      <div style={{ background:isTest?"linear-gradient(135deg,#0d1a0d,#09120a)":"linear-gradient(135deg,#0f0f22,#1a0707)", borderBottom:`2px solid ${accent}33`, padding:"16px 18px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:10, position:"sticky", top:0, zIndex:50 }}>
        <div>
          <div style={{ fontSize:8, letterSpacing:5, color:accent, marginBottom:3 }}>FANTASY F1 2026 · {isTest?"TEST MODE":"LIVE DRAFT"}</div>
          <h1 style={{ fontSize:"clamp(14px,3vw,20px)", fontWeight:700, color:"#fff", letterSpacing:-0.5 }}>
            🏁 Snake Draft Room {isTest && <span style={{ fontSize:12, color:"#22c55e", fontWeight:400 }}>— TEST</span>}
          </h1>
        </div>
        <div style={{ display:"flex", gap:7, flexWrap:"wrap", alignItems:"center" }}>
          <button onClick={() => setTestMode(t=>!t)} style={{ padding:"4px 11px", fontSize:9, letterSpacing:1, background:isTest?"#22c55e22":"transparent", border:`1px solid ${isTest?"#22c55e":"#2a3a2a"}`, color:isTest?"#22c55e":"#3a5a3a", borderRadius:4, cursor:"pointer" }}>
            {isTest?"🧪 TEST ON":"🧪 Test Mode"}
          </button>
          {["board","results"].map(v=>(
            <button key={v} onClick={()=>setView(v)} style={{ padding:"4px 12px", fontSize:9, letterSpacing:2, textTransform:"uppercase", background:view===v?accent:"transparent", border:`1px solid ${view===v?accent:"#2a2a3a"}`, color:view===v?(isTest?"#000":"#fff"):"#64748b", borderRadius:4, cursor:"pointer" }}>
              {v==="board"?"📋 Board":"🏆 Results"}
            </button>
          ))}
          {draft?.started && (
            <button onClick={handleReset} style={{ padding:"4px 11px", fontSize:9, background:isTest?"#0a2a0a":"transparent", border:`1px solid ${isTest?"#22c55e55":"#3a1818"}`, color:isTest?"#22c55e":"#664444", borderRadius:4, cursor:"pointer" }}>
              {isTest?"🗑 Clear Test":"↺ Reset"}
            </button>
          )}
          <button onClick={()=>setShowSetup(true)} style={{ padding:"4px 10px", fontSize:12, background:"transparent", border:"1px solid #1e2e3a", color:"#334a5a", borderRadius:4, cursor:"pointer" }} title="Setup">⚙</button>
        </div>
      </div>

      {/* Banners */}
      {NOT_CONFIGURED && (
        <div style={{ background:"#100a00", borderBottom:"1px solid #ff8c0033", padding:"7px 18px", display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ fontSize:11, color:"#ff8c00" }}>⚠ Running in local-only mode — picks won't sync to other players.</span>
          <button onClick={()=>setShowSetup(true)} style={{ fontSize:10, background:"transparent", border:"1px solid #ff8c0055", color:"#ff8c00", borderRadius:3, padding:"2px 8px", cursor:"pointer" }}>Setup →</button>
        </div>
      )}
      {isTest && (
        <div style={{ background:"#0a1a0a", borderBottom:"1px solid #22c55e22", padding:"6px 18px" }}>
          <span style={{ fontSize:10, color:"#86efac" }}>🧪 Test mode — picks isolated from real draft. Hit <b>Clear Test</b> when done.</span>
        </div>
      )}

      {/* Progress bar */}
      <div style={{ background:"#0a0a14", padding:"7px 18px", borderBottom:"1px solid #1e1e2e", display:"flex", alignItems:"center", gap:12 }}>
        <div style={{ flex:1, background:"#1e1e2e", borderRadius:4, height:4, overflow:"hidden" }}>
          <div style={{ width:`${pct}%`, height:"100%", background:isTest?"linear-gradient(90deg,#22c55e,#86efac)":"linear-gradient(90deg,#e8002d,#ff6060)", transition:"width 0.5s", borderRadius:4 }}/>
        </div>
        <span style={{ fontSize:9, color:"#475569", whiteSpace:"nowrap" }}>{Object.keys(draft?.picks??{}).length}/{PICK_ORDER.length} · {pct}%</span>
        {saving && <span style={{ fontSize:8, color:"#e8002d", letterSpacing:2, animation:"pulse 0.8s infinite" }}>SAVING…</span>}
        {!saving && draft?.started && <span style={{ fontSize:8, color:"#22c55e", letterSpacing:2 }}>● LIVE</span>}
      </div>

      {/* Flash notification */}
      {flash && (
        <div style={{ margin:"10px 18px 0", background:flash.remote?"#0a1a0a":"#0a150a", border:`1px solid ${flash.remote?"#22c55e55":"#22c55e88"}`, borderRadius:8, padding:"9px 14px", display:"flex", alignItems:"center", gap:10, animation:"slideIn 0.3s ease" }}>
          <span style={{ fontSize:16 }}>{flash.remote?"📡":"✅"}</span>
          <span style={{ fontSize:11, color:"#86efac" }}>
            {flash.remote && <span style={{ color:"#4a6a5a" }}>[live] </span>}
            <b>{flash.player}</b> picked <b>{flash.driver}</b> · Pool {flash.pool}
          </span>
        </div>
      )}

      {/* ── BOARD VIEW ── */}
      {view==="board" && (
        <div style={{ padding:"14px 18px 140px" }}>

          {/* On the clock */}
          {!isDone && nextPick && (
            <div style={{ background:isTest?"linear-gradient(135deg,#091509,#0d0d1a)":"linear-gradient(135deg,#180800,#0d0d1a)", border:`1px solid ${isTest?"#22c55e44":"#ff8c0055"}`, borderRadius:10, padding:"14px 16px", marginBottom:16, display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:10 }}>
              <div>
                <div style={{ fontSize:8, letterSpacing:3, color:isTest?"#22c55e":"#ff8c00", marginBottom:4 }}>ON THE CLOCK · PICK #{nextPick.pickNum} · ROUND {nextPick.round} · POOL {nextPick.pool}</div>
                <div style={{ fontSize:22, fontWeight:700, color:"#fff" }}>{nextPick.player}</div>
                <div style={{ fontSize:10, color:"#64748b", marginTop:3 }}>Pool {nextPick.pool} — {nextPick.pool==="A"?"Top 11 drivers":"Bottom 11 drivers"}</div>
              </div>
              {PICK_ORDER[nextPick.pickNum] && (
                <div style={{ textAlign:"right" }}>
                  <div style={{ fontSize:9, color:"#475569", marginBottom:2 }}>Next up</div>
                  <div style={{ fontSize:14, color:"#94a3b8", fontWeight:600 }}>{PICK_ORDER[nextPick.pickNum].player}</div>
                </div>
              )}
            </div>
          )}

          {isDone && (
            <div style={{ background:"linear-gradient(135deg,#0a1a0a,#0d0d1a)", border:"1px solid #22c55e55", borderRadius:10, padding:22, marginBottom:16, textAlign:"center" }}>
              <div style={{ fontSize:36, marginBottom:6 }}>🏆</div>
              <div style={{ fontSize:20, fontWeight:700, color:"#22c55e" }}>{isTest?"Test Complete!":"Draft Complete!"}</div>
              <div style={{ fontSize:11, color:"#64748b", marginTop:4 }}>Switch to Results to see all picks</div>
            </div>
          )}

          {/* Driver grid */}
          {!isDone && nextPick && (
            <>
              <div style={{ fontSize:9, letterSpacing:2, color:"#475569", marginBottom:10 }}>
                AVAILABLE · POOL {nextPick.pool} · {currentPool.filter(d=>!pickedDrivers.has(d.name)).length} remaining
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(145px,1fr))", gap:10, marginBottom:16 }}>
                {currentPool.map(d => (
                  <DriverCard key={d.name} driver={d} selected={selected===d.name} picked={pickedDrivers.has(d.name)} onSelect={setSelected}/>
                ))}
              </div>
            </>
          )}

          {/* Pick history */}
          {madeNums.length > 0 && (
            <>
              <div style={{ fontSize:9, letterSpacing:2, color:"#475569", marginBottom:8, marginTop:6 }}>PICK HISTORY</div>
              <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                {madeNums.map(pn => {
                  const po = PICK_ORDER[pn-1];
                  const dn = draft.picks[pn];
                  const d  = ALL.find(x=>x.name===dn);
                  const tc = T[d?.team]||"#888";
                  return (
                    <div key={pn} style={{ background:"#0a0a14", border:"1px solid #1e1e2e", borderLeft:`3px solid ${po.pool==="A"?"#ffd700":"#334155"}`, borderRadius:6, padding:"6px 12px", display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                      <span style={{ fontSize:9, color:"#475569", minWidth:28 }}>#{pn}</span>
                      <span style={{ fontSize:8, padding:"1px 5px", borderRadius:3, background:po.pool==="A"?"#ffd70015":"#33415515", border:`1px solid ${po.pool==="A"?"#ffd70033":"#334155"}`, color:po.pool==="A"?"#ffd700":"#64748b" }}>R{po.round} {po.pool}</span>
                      <span style={{ fontSize:10, fontWeight:600, color:"#cbd5e1", flex:1, minWidth:60 }}>{po.player}</span>
                      <span style={{ fontSize:10, color:"#fff" }}>{d?.flag} {dn}</span>
                      <span style={{ fontSize:8, padding:"1px 5px", borderRadius:3, background:tc+"18", color:tc }}>{d?.team}</span>
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </div>
      )}

      {/* ── RESULTS VIEW ── */}
      {view==="results" && (
        <div style={{ padding:"14px 18px 30px" }}>
          <div style={{ fontSize:9, letterSpacing:2, color:"#475569", marginBottom:14 }}>ALL PLAYERS · PICKS</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))", gap:12 }}>
            {PLAYERS_R1.map(player => {
              const { a:pA, b:pB } = getPlayerPicks(player);
              const dA = ALL.find(d=>d.name===pA);
              const dB = ALL.find(d=>d.name===pB);
              const r1 = PICK_ORDER.find(p=>p.player===player&&p.round===1);
              const r2 = PICK_ORDER.find(p=>p.player===player&&p.round===2);
              const onClock = nextPick?.player===player;
              return (
                <div key={player} style={{ background:onClock?"#180a00":"#0d0d1a", border:`1px solid ${onClock?"#ff8c00":"#1e1e2e"}`, borderRadius:10, padding:"14px 14px", position:"relative" }}>
                  {onClock && <div style={{ position:"absolute", top:-1, right:10, background:"#ff8c00", borderRadius:"0 0 5px 5px", padding:"2px 7px", fontSize:7, letterSpacing:2, color:"#000", fontWeight:700 }}>ON THE CLOCK</div>}
                  <div style={{ fontSize:13, fontWeight:700, color:"#fff", marginBottom:12 }}>{player}</div>
                  {[{label:"POOL A",pickNum:r1?.pickNum,dn:pA,d:dA,gold:true},{label:"POOL B",pickNum:r2?.pickNum,dn:pB,d:dB,gold:false}].map(({label,pickNum,dn,d,gold})=>(
                    <div key={label} style={{ marginBottom:gold?8:0 }}>
                      <div style={{ fontSize:7, letterSpacing:2, color:gold?"#ffd700":"#475569", marginBottom:4 }}>{label} · PICK #{pickNum}</div>
                      {dn ? (
                        <div style={{ background:gold?"#1a1500":"#0f0f1a", border:`1px solid ${gold?"#ffd70033":"#2a3a4a"}`, borderRadius:7, padding:"7px 9px", display:"flex", alignItems:"center", gap:8 }}>
                          <img src={d?.img} alt={dn} style={{ width:38, height:38, borderRadius:5, objectFit:"cover", objectPosition:"top", flexShrink:0 }} onError={e=>{e.target.style.display="none"}}/>
                          <div style={{ flex:1, minWidth:0 }}>
                            <div style={{ fontSize:11, fontWeight:700, color:"#fff", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{dn}</div>
                            <div style={{ fontSize:8, color:T[d?.team]||"#888", marginTop:1 }}>{d?.team}</div>
                          </div>
                          <span style={{ fontSize:14 }}>{d?.flag}</span>
                        </div>
                      ) : (
                        <div style={{ background:gold?"#0f0f00":"#0a0a14", border:`1px dashed ${gold?"#ffd70020":"#1e2e3a"}`, borderRadius:7, padding:"7px 9px", fontSize:9, color:"#2a3a4a" }}>Pending…</div>
                      )}
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── STICKY CONFIRM BAR ── */}
      {selected && !isDone && nextPick && (() => {
        const sd = ALL.find(d=>d.name===selected);
        const tc = T[sd?.team]||"#888";
        return (
          <div style={{ position:"fixed", bottom:0, left:0, right:0, background:isTest?"linear-gradient(135deg,#041204,#07080a)":"linear-gradient(135deg,#08081e,#0f0404)", borderTop:`2px solid ${accent}`, padding:"11px 18px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:10, boxShadow:`0 -16px 48px ${accent}22`, zIndex:100 }}>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <img src={sd?.img} alt={selected} style={{ width:52, height:52, borderRadius:8, objectFit:"cover", objectPosition:"top", border:`2px solid ${tc}55`, display:"block", flexShrink:0 }} onError={e=>{e.target.style.display="none"}}/>
              <div>
                <div style={{ fontSize:8, color:"#64748b", marginBottom:2, letterSpacing:1 }}>{nextPick.player} SELECTS</div>
                <div style={{ fontSize:18, fontWeight:700, color:"#fff", lineHeight:1.1 }}>{selected}</div>
                <div style={{ fontSize:10, color:tc, marginTop:2 }}>{sd?.team}</div>
              </div>
            </div>
            <div style={{ display:"flex", gap:9 }}>
              <button onClick={()=>setSelected(null)} style={{ padding:"10px 18px", fontSize:11, background:"transparent", border:"1px solid #2a3a4a", color:"#64748b", borderRadius:6, cursor:"pointer" }}>Cancel</button>
              <button onClick={()=>makePick(selected)} disabled={saving} style={{ padding:"10px 26px", fontSize:12, fontWeight:700, background:saving?"#222":accent, border:"none", color:isTest&&!saving?"#000":"#fff", borderRadius:6, cursor:saving?"not-allowed":"pointer", letterSpacing:1 }}>
                {saving?"SAVING…":"✓ CONFIRM PICK"}
              </button>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
