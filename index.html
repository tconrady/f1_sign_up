<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

function useWindowWidth() {
  const [w, setW] = useState(window.innerWidth);
  useEffect(() => {
    const fn = () => setW(window.innerWidth);
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);
  return w;
}

// ── Portrait URL ──────────────────────────────────────────────────────────
function f1img(team, code) {
  return `https://media.formula1.com/image/upload/c_fill,w_300,h_300,g_north/q_auto/d_common:f1:2026:fallback:driver:2026fallbackdriverright.webp/v1740000000/common/f1/2026/${team}/${code}/2026${team}${code}right.webp`;
}

// ── Static data ───────────────────────────────────────────────────────────
const TEAM_COLORS = {
  "Red Bull":"#3671c6","Mercedes":"#00d2be","Ferrari":"#e8002d",
  "McLaren":"#ff8000","Williams":"#64c4ff","Alpine":"#0093cc",
  "Haas":"#b6babd","Audi":"#e4002c","Racing Bulls":"#6692ff",
  "Aston Martin":"#358c75","Cadillac":"#a7a7a7",
};

function seededShuffle(arr, seed) {
  const a = [...arr]; let s = seed;
  for (let i = a.length - 1; i > 0; i--) {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    [a[i], a[Math.abs(s) % (i + 1)]] = [a[Math.abs(s) % (i + 1)], a[i]];
  }
  return a;
}

const POOL_A_BASE = [
  { name:"Max Verstappen",    team:"Red Bull",     flag:"🇳🇱", avg:"1.8",  number:33, img:f1img("redbullracing","maxver01") },
  { name:"George Russell",    team:"Mercedes",     flag:"🇬🇧", avg:"1.8",  number:63, img:f1img("mercedes","georus01") },
  { name:"Charles Leclerc",   team:"Ferrari",      flag:"🇲🇨", avg:"2.5",  number:16, img:f1img("ferrari","chalec01") },
  { name:"Lando Norris",      team:"McLaren",      flag:"🇬🇧", avg:"3.5",  number:4,  img:f1img("mclaren","lannor01") },
  { name:"Kimi Antonelli",    team:"Mercedes",     flag:"🇮🇹", avg:"4.8",  number:12, img:f1img("mercedes","andant01") },
  { name:"Oscar Piastri",     team:"McLaren",      flag:"🇦🇺", avg:"5.3",  number:81, img:f1img("mclaren","oscpia01") },
  { name:"Lewis Hamilton",    team:"Ferrari",      flag:"🇬🇧", avg:"6.3",  number:44, img:f1img("ferrari","lewham01") },
  { name:"Isack Hadjar",      team:"Red Bull",     flag:"🇫🇷", avg:"7.8",  number:6,  img:f1img("redbullracing","isahad01") },
  { name:"Carlos Sainz",      team:"Williams",     flag:"🇪🇸", avg:"9.0",  number:55, img:f1img("williams","carsai01") },
  { name:"Pierre Gasly",      team:"Alpine",       flag:"🇫🇷", avg:"9.7",  number:10, img:f1img("alpine","piegas01") },
  { name:"Fernando Alonso",   team:"Aston Martin", flag:"🇪🇸", avg:"10.8", number:14, img:f1img("astonmartin","feralo01") },
];
const POOL_B_BASE = [
  { name:"Alex Albon",        team:"Williams",     flag:"🇹🇭", avg:"12.0", number:23, img:f1img("williams","alealb01") },
  { name:"Nico Hülkenberg",   team:"Audi",         flag:"🇩🇪", avg:"13.0", number:27, img:f1img("audi","nichul01") },
  { name:"Gabriel Bortoleto", team:"Audi",         flag:"🇧🇷", avg:"14.0", number:5,  img:f1img("audi","gabbor01") },
  { name:"Esteban Ocon",      team:"Haas",         flag:"🇫🇷", avg:"14.8", number:31, img:f1img("haas","estoco01") },
  { name:"Franco Colapinto",  team:"Alpine",       flag:"🇦🇷", avg:"16.5", number:43, img:f1img("alpine","fracol01") },
  { name:"Liam Lawson",       team:"Racing Bulls", flag:"🇳🇿", avg:"16.8", number:30, img:f1img("racingbulls","lialaw01") },
  { name:"Arvid Lindblad",    team:"Racing Bulls", flag:"🇬🇧", avg:"17.5", number:41, img:f1img("racingbulls","arvlin01") },
  { name:"Oliver Bearman",    team:"Haas",         flag:"🇬🇧", avg:"17.8", number:87, img:f1img("haas","olibea01") },
  { name:"Lance Stroll",      team:"Aston Martin", flag:"🇨🇦", avg:"19.8", number:18, img:f1img("astonmartin","lanstr01") },
  { name:"Valtteri Bottas",   team:"Cadillac",     flag:"🇫🇮", avg:"20.2", number:77, img:f1img("cadillac","valbot01") },
  { name:"Sergio Pérez",      team:"Cadillac",     flag:"🇲🇽", avg:"21.2", number:11, img:f1img("cadillac","serper01") },
];

const POOL_A = seededShuffle(POOL_A_BASE, 20260308);
const POOL_B = seededShuffle(POOL_B_BASE, 20260309);
const ALL    = [...POOL_A_BASE, ...POOL_B_BASE];

const PLAYERS_R1 = ["Alyssa","Nora","Jay","Margaret","Cecelia","Charlie","Sarah","Timo","Mary Beth","David","Jane"];
const PLAYERS_R2 = ["Jane","David","Mary Beth","Timo","Sarah","Charlie","Cecelia","Margaret","Jay","Nora","Alyssa"];
const ALL_PLAYERS = [...new Set([...PLAYERS_R1, ...PLAYERS_R2])];

const PICK_ORDER = [
  ...PLAYERS_R1.map((p,i) => ({ pickNum:i+1,  round:1, player:p, pool:"A" })),
  ...PLAYERS_R2.map((p,i) => ({ pickNum:i+12, round:2, player:p, pool:"B" })),
];

// ── JSONBin ───────────────────────────────────────────────────────────────
const { BIN_ID, ACCESS_KEY, POLL_MS } = window.DRAFT_CONFIG;
const NOT_CONFIGURED = BIN_ID === "YOUR_BIN_ID_HERE";
const JSONBIN_BASE   = "https://api.jsonbin.io/v3";
const EMPTY_DRAFT    = { picks:{}, started:false };

async function binLoad() {
  if (NOT_CONFIGURED) {
    const raw = localStorage.getItem("f1_draft_2026");
    return raw ? JSON.parse(raw) : { live:{ ...EMPTY_DRAFT }, test:{ ...EMPTY_DRAFT } };
  }
  try {
    const r = await fetch(`${JSONBIN_BASE}/b/${BIN_ID}/latest`, {
      headers: { "X-Access-Key": ACCESS_KEY }
    });
    const data = await r.json();
    return data.record ?? { live:{ ...EMPTY_DRAFT }, test:{ ...EMPTY_DRAFT } };
  } catch {
    return { live:{ ...EMPTY_DRAFT }, test:{ ...EMPTY_DRAFT } };
  }
}

async function binSave(record) {
  if (NOT_CONFIGURED) {
    localStorage.setItem("f1_draft_2026", JSON.stringify(record));
    return;
  }
  try {
    await fetch(`${JSONBIN_BASE}/b/${BIN_ID}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json", "X-Access-Key": ACCESS_KEY },
      body: JSON.stringify(record),
    });
  } catch {}
}

// Helper: get driver name from pick value (supports old string format and new object format)
function driverName(v) {
  if (!v) return null;
  return typeof v === "object" ? v.driver : v;
}

// ── Player selection screen ───────────────────────────────────────────────
function PlayerSelect({ onSelect }) {
  return (
    <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:24 }}>
      <div style={{ fontSize:8, letterSpacing:5, color:"#e8002d", marginBottom:8 }}>FANTASY F1 2026</div>
      <h1 style={{ fontSize:"clamp(22px,5vw,34px)", fontWeight:700, color:"#fff", marginBottom:6, letterSpacing:-1 }}>🏁 Draft Room</h1>
      <p style={{ fontSize:12, color:"#475569", marginBottom:28 }}>Select your name to continue</p>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))", gap:8, width:"100%", maxWidth:500 }}>
        {ALL_PLAYERS.map(player => {
          const r1 = PICK_ORDER.find(p => p.player===player && p.round===1);
          return (
            <button
              key={player}
              onClick={() => onSelect(player)}
              style={{ background:"#0d0d1a", border:"1px solid #1e1e2e", borderRadius:10, padding:"14px 8px", cursor:"pointer", color:"#fff", fontFamily:"inherit", textAlign:"center", transition:"all 0.15s" }}
              onMouseEnter={e => { e.currentTarget.style.borderColor="#e8002d88"; e.currentTarget.style.background="#130a0a"; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor="#1e1e2e"; e.currentTarget.style.background="#0d0d1a"; }}
            >
              <div style={{ fontSize:14, fontWeight:700, marginBottom:3 }}>{player}</div>
              <div style={{ fontSize:9, color:"#475569" }}>Pick #{r1?.pickNum} first</div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ── Pick order table ──────────────────────────────────────────────────────
function PickOrderTable({ picks, nextPick, myName }) {
  return (
    <div style={{ marginBottom:16 }}>
      <div style={{ fontSize:9, letterSpacing:2, color:"#475569", marginBottom:8 }}>DRAFT ORDER</div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6 }}>
        {[
          { label:"ROUND 1 · POOL A", labelColor:"#ffd700", players:PLAYERS_R1, offset:0 },
          { label:"ROUND 2 · POOL B", labelColor:"#64748b", players:PLAYERS_R2, offset:11 },
        ].map(({ label, labelColor, players, offset }) => (
          <div key={label}>
            <div style={{ fontSize:7, letterSpacing:2, color:labelColor, marginBottom:5 }}>{label}</div>
            <div style={{ display:"flex", flexDirection:"column", gap:2 }}>
              {players.map((player, i) => {
                const pn      = i + 1 + offset;
                const pickVal = picks[pn];
                const dn      = driverName(pickVal);
                const d       = dn ? ALL.find(x => x.name===dn) : null;
                const isClock = nextPick?.pickNum === pn;
                const isDone  = !!dn;
                const isMe    = player === myName;
                return (
                  <div key={pn} style={{
                    display:"flex", alignItems:"center", gap:5, padding:"4px 7px", borderRadius:5,
                    background: isClock ? "#1a0e00" : isDone ? "#090911" : "#0d0d1a",
                    border:`1px solid ${isClock ? "#ff8c00" : isMe && !isDone ? "#2a2a44" : "#131320"}`,
                    animation: isClock ? "glow 2s infinite" : "none",
                  }}>
                    <span style={{ fontSize:8, color:"#334", minWidth:16, textAlign:"right", flexShrink:0 }}>{pn}</span>
                    <span style={{ fontSize:"clamp(9px,2.5vw,11px)", fontWeight:isMe?700:400, color:isClock?"#fff":isDone?"#334":isMe?"#c0c8e0":"#55607a", flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                      {player}{isMe?" 👤":""}
                    </span>
                    {isClock && <span style={{ fontSize:8, color:"#ff8c00", flexShrink:0 }}>▶</span>}
                    {isDone && d && <span style={{ fontSize:10, flexShrink:0 }}>{d.flag}</span>}
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Driver Card ───────────────────────────────────────────────────────────
function DriverCard({ driver, selected, onSelect, picked, locked }) {
  const tc = TEAM_COLORS[driver.team] || "#888";
  const [imgFailed, setImgFailed] = useState(false);
  const interactive = !picked && !locked;
  return (
    <div
      onClick={() => interactive && onSelect(driver.name)}
      style={{
        background: picked ? "#0a0a12" : selected ? tc+"18" : "#0d0d1a",
        border:`2px solid ${picked?"#1a1a2a":selected?tc:"#1e1e2e"}`,
        borderRadius:10, overflow:"hidden", position:"relative",
        cursor:interactive?"pointer":"default",
        transition:"all 0.15s",
        opacity:picked?0.3:locked?0.55:1,
        boxShadow:selected&&interactive?`0 0 16px ${tc}33`:"none",
      }}
    >
      <div style={{ width:"100%", height:110, overflow:"hidden", position:"relative", background:`linear-gradient(160deg,${tc}33 0%,#0a0a14 60%)`, flexShrink:0 }}>
        {!imgFailed ? (
          <img src={driver.img} alt={driver.name}
            style={{ width:"100%", height:"100%", objectFit:"cover", objectPosition:"top center", display:"block", filter:picked?"grayscale(1) opacity(0.4)":"none", transition:"filter 0.2s" }}
            onError={() => setImgFailed(true)}
          />
        ) : (
          <div style={{ width:"100%", height:"100%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:40 }}>{driver.flag}</div>
        )}
        <div style={{ position:"absolute", top:5, right:6, fontSize:11, fontWeight:800, color:picked?"#333":tc, fontFamily:"monospace", textShadow:picked?"none":`0 0 8px ${tc}` }}>
          #{driver.number}
        </div>
        {picked && (
          <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", background:"#00000099", fontSize:26 }}>✓</div>
        )}
        {selected && interactive && (
          <div style={{ position:"absolute", inset:0, border:`2px solid ${tc}`, borderRadius:8, pointerEvents:"none" }}/>
        )}
      </div>
      <div style={{ padding:"7px 8px 9px" }}>
        <div style={{ fontSize:"clamp(9px,2.4vw,11px)", fontWeight:700, color:picked?"#445":"#fff", lineHeight:1.2, marginBottom:4 }}>{driver.name}</div>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:2 }}>
          <span style={{ fontSize:"clamp(7px,1.8vw,8px)", padding:"1px 4px", borderRadius:3, background:tc+(picked?"11":"22"), border:`1px solid ${tc}${picked?"22":"55"}`, color:picked?"#556":tc, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", maxWidth:"74%" }}>{driver.team}</span>
          <span style={{ fontSize:"clamp(7px,1.8vw,8px)", color:picked?"#2a2a3a":"#4a5568" }}>#{driver.avg}</span>
        </div>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────
function App() {
  const [myName, setMyName]     = useState(null);
  const [record, setRecord]     = useState(null);
  const [loading, setLoading]   = useState(true);
  const [selected, setSelected] = useState(null);
  const [view, setView]         = useState("board");
  const [flash, setFlash]       = useState(null);
  const [saving, setSaving]     = useState(false);
  const [testMode, setTestMode] = useState(false);
  const prevCount               = useRef(0);
  const windowWidth             = useWindowWidth();

  const draftKey = testMode ? "test" : "live";
  const draft    = record?.[draftKey] ?? EMPTY_DRAFT;
  const picks    = draft.picks ?? {};

  const load = useCallback(async () => {
    const rec = await binLoad();
    setRecord(rec);
    prevCount.current = Object.keys(rec[draftKey]?.picks ?? {}).length;
    setLoading(false);
  }, [draftKey]);

  useEffect(() => { setLoading(true); setSelected(null); load(); }, [draftKey]);

  // Poll for remote changes
  useEffect(() => {
    const iv = setInterval(async () => {
      const fresh = await binLoad();
      const fd    = fresh[draftKey];
      const nc    = Object.keys(fd?.picks ?? {}).length;
      if (nc > prevCount.current) {
        const newPn = Object.keys(fd.picks).find(k => !picks[k]);
        if (newPn) {
          const po = PICK_ORDER[Number(newPn)-1];
          doFlash({ player:po.player, driver:driverName(fd.picks[newPn]), pool:po.pool, remote:true });
        }
        setRecord(fresh);
        prevCount.current = nc;
      }
    }, POLL_MS);
    return () => clearInterval(iv);
  }, [draftKey, picks]);

  function doFlash(data) {
    setFlash(data);
    setTimeout(() => setFlash(null), 4500);
  }

  const pickedNames = new Set(Object.values(picks).map(driverName).filter(Boolean));
  const nextPick    = PICK_ORDER.find(p => !picks[p.pickNum]) ?? null;
  const isDone      = Object.keys(picks).length === PICK_ORDER.length;
  const currentPool = nextPick?.pool === "A" ? POOL_A : POOL_B;
  const madeNums    = Object.keys(picks).map(Number).sort((a,b) => b-a);
  const pct         = Math.round(Object.keys(picks).length / PICK_ORDER.length * 100);
  const isMyTurn    = !!myName && nextPick?.player === myName;
  const T           = TEAM_COLORS;

  async function makePick(name) {
    if (!nextPick || !name || saving || !record || !isMyTurn) return;
    setSaving(true);
    const entry     = { driver:name, player:nextPick.player, pool:nextPick.pool, round:nextPick.round, ts:Math.floor(Date.now()/1000) };
    const newDraft  = { picks:{ ...picks, [nextPick.pickNum]:entry }, started:true };
    const newRecord = { ...record, [draftKey]:newDraft };
    setRecord(newRecord);
    prevCount.current = Object.keys(newDraft.picks).length;
    await binSave(newRecord);
    setSaving(false);
    doFlash({ player:nextPick.player, driver:name, pool:nextPick.pool });
    setSelected(null);
  }

  async function handleReset() {
    if (!confirm(testMode ? "Clear all test picks?" : "Reset the REAL draft? Cannot be undone.")) return;
    const newRecord = { ...record, [draftKey]:{ ...EMPTY_DRAFT } };
    setRecord(newRecord);
    prevCount.current = 0;
    await binSave(newRecord);
    setSelected(null); setFlash(null);
  }

  function getPlayerPicks(player) {
    const r1 = PICK_ORDER.find(p => p.player===player && p.round===1);
    const r2 = PICK_ORDER.find(p => p.player===player && p.round===2);
    return { a: driverName(picks[r1?.pickNum]), b: driverName(picks[r2?.pickNum]) };
  }

  if (!myName) return <PlayerSelect onSelect={n => { setMyName(n); setLoading(true); load(); }} />;

  if (loading) return (
    <div style={{ height:"100vh", display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ color:"#e8002d", fontSize:13, letterSpacing:5, animation:"pulse 1.2s infinite" }}>LOADING…</div>
    </div>
  );

  const accent = testMode ? "#22c55e" : "#e8002d";

  return (
    <div style={{ minHeight:"100vh", background:"#07070f" }}>

      {/* ── HEADER ── */}
      <div style={{ background:testMode?"linear-gradient(135deg,#0d1a0d,#09120a)":"linear-gradient(135deg,#0f0f22,#1a0707)", borderBottom:`2px solid ${accent}33`, padding:"11px 14px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:8, position:"sticky", top:0, zIndex:50 }}>
        <div>
          <div style={{ fontSize:7, letterSpacing:4, color:accent, marginBottom:2 }}>FANTASY F1 2026 · {testMode?"TEST":"LIVE"}</div>
          <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
            <span style={{ fontSize:"clamp(13px,3vw,18px)", fontWeight:700, color:"#fff" }}>🏁 Draft Room</span>
            <span style={{ fontSize:11, color:"#475569" }}>/ {myName}</span>
            <button onClick={() => setMyName(null)} style={{ fontSize:8, background:"transparent", border:"1px solid #2a2a3a", color:"#475569", borderRadius:3, padding:"1px 5px", cursor:"pointer" }}>change</button>
          </div>
        </div>
        <div style={{ display:"flex", gap:5, flexWrap:"wrap", alignItems:"center" }}>
          <button onClick={() => setTestMode(t=>!t)} style={{ padding:"3px 8px", fontSize:8, background:testMode?"#22c55e22":"transparent", border:`1px solid ${testMode?"#22c55e":"#2a3a2a"}`, color:testMode?"#22c55e":"#3a5a3a", borderRadius:4, cursor:"pointer" }}>
            {testMode?"🧪 ON":"🧪"}
          </button>
          {["board","results"].map(v => (
            <button key={v} onClick={()=>setView(v)} style={{ padding:"3px 10px", fontSize:8, letterSpacing:1, textTransform:"uppercase", background:view===v?accent:"transparent", border:`1px solid ${view===v?accent:"#2a2a3a"}`, color:view===v?(testMode?"#000":"#fff"):"#64748b", borderRadius:4, cursor:"pointer" }}>
              {v==="board"?"Board":"Results"}
            </button>
          ))}
          {draft.started && (
            <button onClick={handleReset} style={{ padding:"3px 8px", fontSize:8, background:"transparent", border:`1px solid ${testMode?"#22c55e44":"#3a1818"}`, color:testMode?"#22c55e":"#664444", borderRadius:4, cursor:"pointer" }}>
              {testMode?"🗑":"↺"}
            </button>
          )}
        </div>
      </div>

      {/* Banners */}
      {NOT_CONFIGURED && (
        <div style={{ background:"#100a00", borderBottom:"1px solid #ff8c0033", padding:"5px 14px" }}>
          <span style={{ fontSize:10, color:"#ff8c00" }}>⚠ Local-only mode — picks won't sync to other players.</span>
        </div>
      )}
      {testMode && (
        <div style={{ background:"#0a1a0a", borderBottom:"1px solid #22c55e22", padding:"5px 14px" }}>
          <span style={{ fontSize:10, color:"#86efac" }}>🧪 Test mode — isolated from real draft.</span>
        </div>
      )}

      {/* Your turn banner */}
      {isMyTurn && !isDone && (
        <div style={{ background:"linear-gradient(90deg,#1c0900,#0f0700)", borderBottom:"2px solid #ff8c0066", padding:"10px 14px", display:"flex", alignItems:"center", gap:10, animation:"glow 2s infinite" }}>
          <span style={{ fontSize:22 }}>⏰</span>
          <div>
            <div style={{ fontSize:8, letterSpacing:3, color:"#ff8c00", marginBottom:1 }}>YOUR TURN</div>
            <div style={{ fontSize:14, fontWeight:700, color:"#fff" }}>Pick #{nextPick.pickNum} · Pool {nextPick.pool} · Round {nextPick.round}</div>
          </div>
        </div>
      )}

      {/* Progress */}
      <div style={{ background:"#0a0a14", padding:"6px 14px", borderBottom:"1px solid #1e1e2e", display:"flex", alignItems:"center", gap:10 }}>
        <div style={{ flex:1, background:"#1e1e2e", borderRadius:4, height:4, overflow:"hidden" }}>
          <div style={{ width:`${pct}%`, height:"100%", background:testMode?"linear-gradient(90deg,#22c55e,#86efac)":"linear-gradient(90deg,#e8002d,#ff6060)", transition:"width 0.5s", borderRadius:4 }}/>
        </div>
        <span style={{ fontSize:9, color:"#475569", whiteSpace:"nowrap" }}>{Object.keys(picks).length}/{PICK_ORDER.length}</span>
        {saving && <span style={{ fontSize:8, color:"#e8002d", animation:"pulse 0.8s infinite" }}>SAVING…</span>}
        {!saving && draft.started && <span style={{ fontSize:8, color:"#22c55e" }}>● LIVE</span>}
      </div>

      {/* Flash */}
      {flash && (
        <div style={{ margin:"8px 14px 0", background:flash.remote?"#0a1a0a":"#0a150a", border:`1px solid ${flash.remote?"#22c55e44":"#22c55e88"}`, borderRadius:8, padding:"7px 12px", display:"flex", alignItems:"center", gap:8, animation:"slideIn 0.3s ease" }}>
          <span>{flash.remote?"📡":"✅"}</span>
          <span style={{ fontSize:11, color:"#86efac" }}>
            {flash.remote && <span style={{ color:"#3a5a4a" }}>[live] </span>}
            <b>{flash.player}</b> picked <b>{flash.driver}</b> · Pool {flash.pool}
          </span>
        </div>
      )}

      {/* ── BOARD VIEW ── */}
      {view==="board" && (
        <div style={{ padding:"12px 14px 150px" }}>

          {!isMyTurn && <PickOrderTable picks={picks} nextPick={nextPick} myName={myName} />}

          {/* On the clock */}
          {!isDone && nextPick && (
            <div style={{ background:testMode?"linear-gradient(135deg,#091509,#0d0d1a)":"linear-gradient(135deg,#180800,#0d0d1a)", border:`1px solid ${testMode?"#22c55e44":"#ff8c0044"}`, borderRadius:10, padding:"12px 14px", marginBottom:12, display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:8 }}>
              <div>
                <div style={{ fontSize:8, letterSpacing:3, color:testMode?"#22c55e":"#ff8c00", marginBottom:3 }}>ON THE CLOCK · PICK #{nextPick.pickNum} · POOL {nextPick.pool}</div>
                <div style={{ fontSize:20, fontWeight:700, color:"#fff" }}>{nextPick.player}</div>
              </div>
              {PICK_ORDER[nextPick.pickNum] && (
                <div style={{ textAlign:"right" }}>
                  <div style={{ fontSize:8, color:"#475569", marginBottom:1 }}>Next</div>
                  <div style={{ fontSize:13, color:"#94a3b8", fontWeight:600 }}>{PICK_ORDER[nextPick.pickNum].player}</div>
                </div>
              )}
            </div>
          )}

          {isDone && (
            <div style={{ background:"linear-gradient(135deg,#0a1a0a,#0d0d1a)", border:"1px solid #22c55e55", borderRadius:10, padding:20, marginBottom:12, textAlign:"center" }}>
              <div style={{ fontSize:32, marginBottom:4 }}>🏆</div>
              <div style={{ fontSize:18, fontWeight:700, color:"#22c55e" }}>Draft Complete!</div>
              <div style={{ fontSize:11, color:"#64748b", marginTop:3 }}>View the Results tab to see all picks</div>
            </div>
          )}

          {/* Waiting / view-only notice */}
          {!isDone && nextPick && !isMyTurn && (
            <div style={{ background:"#0a0a14", border:"1px solid #1a1a28", borderRadius:8, padding:"9px 12px", marginBottom:12, fontSize:11, color:"#475569", textAlign:"center" }}>
              Waiting for <b style={{ color:"#7a8aaa" }}>{nextPick.player}</b> to pick…
            </div>
          )}

          {/* Driver grid */}
          {!isDone && nextPick && (
            <>
              <div style={{ fontSize:8, letterSpacing:2, color:"#475569", marginBottom:8 }}>
                POOL {nextPick.pool} · {currentPool.filter(d=>!pickedNames.has(d.name)).length} remaining
                {!isMyTurn && <span style={{ color:"#252535", marginLeft:8 }}>(view only)</span>}
              </div>
              <div style={{ display:"grid", gridTemplateColumns: windowWidth <= 380 ? "repeat(3,1fr)" : "repeat(auto-fill,minmax(110px,1fr))", gap: windowWidth <= 380 ? 5 : 8, marginBottom:12 }}>
                {currentPool.map(d => (
                  <DriverCard key={d.name} driver={d} selected={selected===d.name} picked={pickedNames.has(d.name)} locked={!isMyTurn} onSelect={setSelected}/>
                ))}
              </div>
            </>
          )}

          {/* Pick history */}
          {madeNums.length > 0 && (
            <>
              <div style={{ fontSize:8, letterSpacing:2, color:"#475569", marginBottom:6, marginTop:4 }}>PICK HISTORY</div>
              <div style={{ display:"flex", flexDirection:"column", gap:3 }}>
                {madeNums.map(pn => {
                  const po  = PICK_ORDER[pn-1];
                  const pv  = picks[pn];
                  const dn  = driverName(pv);
                  const d   = ALL.find(x => x.name===dn);
                  const tc  = T[d?.team]||"#888";
                  const ts  = typeof pv==="object" ? pv.ts : null;
                  return (
                    <div key={pn} style={{ background:"#0a0a14", border:"1px solid #131320", borderLeft:`3px solid ${po.pool==="A"?"#ffd700":"#2a3a55"}`, borderRadius:6, padding:"5px 10px", display:"flex", alignItems:"center", gap:7, flexWrap:"wrap" }}>
                      <span style={{ fontSize:8, color:"#334", minWidth:22 }}>#{pn}</span>
                      <span style={{ fontSize:7, padding:"1px 4px", borderRadius:3, background:po.pool==="A"?"#ffd70015":"#2a3a5515", border:`1px solid ${po.pool==="A"?"#ffd70033":"#2a3a55"}`, color:po.pool==="A"?"#ffd700":"#64748b" }}>R{po.round} {po.pool}</span>
                      <span style={{ fontSize:10, fontWeight:600, color:"#8090b0", flex:1, minWidth:50 }}>{po.player}</span>
                      <span style={{ fontSize:10, color:"#c0cce0" }}>{d?.flag} {dn}</span>
                      <span style={{ fontSize:7, padding:"1px 4px", borderRadius:3, background:tc+"18", color:tc }}>{d?.team}</span>
                      {ts && <span style={{ fontSize:7, color:"#252535" }}>{new Date(ts*1000).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</span>}
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </div>
      )}

      {/* ── RESULTS VIEW ── */}
      {view==="results" && (
        <div style={{ padding:"12px 14px 30px" }}>
          <div style={{ fontSize:8, letterSpacing:2, color:"#475569", marginBottom:12 }}>ALL PLAYERS · PICKS</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))", gap:10 }}>
            {PLAYERS_R1.map(player => {
              const { a:pA, b:pB } = getPlayerPicks(player);
              const dA = ALL.find(d=>d.name===pA);
              const dB = ALL.find(d=>d.name===pB);
              const r1 = PICK_ORDER.find(p=>p.player===player&&p.round===1);
              const r2 = PICK_ORDER.find(p=>p.player===player&&p.round===2);
              const onClock = nextPick?.player===player;
              const isMe    = player===myName;
              return (
                <div key={player} style={{ background:onClock?"#180a00":isMe?"#0d0d1f":"#0d0d1a", border:`1px solid ${onClock?"#ff8c00":isMe?"#2a2a50":"#1e1e2e"}`, borderRadius:10, padding:"12px 12px", position:"relative" }}>
                  {onClock && <div style={{ position:"absolute", top:-1, right:10, background:"#ff8c00", borderRadius:"0 0 5px 5px", padding:"2px 6px", fontSize:7, letterSpacing:2, color:"#000", fontWeight:700 }}>ON THE CLOCK</div>}
                  <div style={{ fontSize:13, fontWeight:700, color:"#fff", marginBottom:10 }}>{player}{isMe?" 👤":""}</div>
                  {[{label:"POOL A",pn:r1?.pickNum,dn:pA,d:dA,gold:true},{label:"POOL B",pn:r2?.pickNum,dn:pB,d:dB,gold:false}].map(({label,pn,dn,d,gold})=>(
                    <div key={label} style={{ marginBottom:gold?7:0 }}>
                      <div style={{ fontSize:7, letterSpacing:2, color:gold?"#ffd700":"#475569", marginBottom:3 }}>{label} · PICK #{pn}</div>
                      {dn ? (
                        <div style={{ background:gold?"#1a1500":"#0f0f1a", border:`1px solid ${gold?"#ffd70033":"#2a3a4a"}`, borderRadius:7, padding:"6px 8px", display:"flex", alignItems:"center", gap:7 }}>
                          <img src={d?.img} alt={dn} style={{ width:36, height:36, borderRadius:5, objectFit:"cover", objectPosition:"top", flexShrink:0 }} onError={e=>{e.target.style.display="none"}}/>
                          <div style={{ flex:1, minWidth:0 }}>
                            <div style={{ fontSize:11, fontWeight:700, color:"#fff", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{dn}</div>
                            <div style={{ fontSize:8, color:T[d?.team]||"#888", marginTop:1 }}>{d?.team}</div>
                          </div>
                          <span style={{ fontSize:14 }}>{d?.flag}</span>
                        </div>
                      ) : (
                        <div style={{ background:gold?"#0f0f00":"#0a0a14", border:`1px dashed ${gold?"#ffd70020":"#1e2e3a"}`, borderRadius:7, padding:"6px 8px", fontSize:9, color:"#2a3a4a" }}>Pending…</div>
                      )}
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── CONFIRM BAR (only when it's your turn) ── */}
      {selected && !isDone && isMyTurn && (() => {
        const sd = ALL.find(d=>d.name===selected);
        const tc = T[sd?.team]||"#888";
        return (
          <div style={{ position:"fixed", bottom:0, left:0, right:0, background:testMode?"linear-gradient(135deg,#041204,#07080a)":"linear-gradient(135deg,#08081e,#0f0404)", borderTop:`2px solid ${accent}`, padding:"10px 14px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:8, boxShadow:`0 -16px 40px ${accent}22`, zIndex:100 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <img src={sd?.img} alt={selected} style={{ width:48, height:48, borderRadius:8, objectFit:"cover", objectPosition:"top", border:`2px solid ${tc}55`, flexShrink:0 }} onError={e=>{e.target.style.display="none"}}/>
              <div>
                <div style={{ fontSize:8, color:"#64748b", marginBottom:1, letterSpacing:1 }}>YOU SELECT</div>
                <div style={{ fontSize:16, fontWeight:700, color:"#fff", lineHeight:1.1 }}>{selected}</div>
                <div style={{ fontSize:9, color:tc }}>{sd?.team}</div>
              </div>
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={()=>setSelected(null)} style={{ padding:"9px 14px", fontSize:11, background:"transparent", border:"1px solid #2a3a4a", color:"#64748b", borderRadius:6, cursor:"pointer" }}>Cancel</button>
              <button onClick={()=>makePick(selected)} disabled={saving} style={{ padding:"9px 20px", fontSize:12, fontWeight:700, background:saving?"#222":accent, border:"none", color:testMode&&!saving?"#000":"#fff", borderRadius:6, cursor:saving?"not-allowed":"pointer", letterSpacing:1 }}>
                {saving?"SAVING…":"✓ CONFIRM"}
              </button>
            </div>
          </div>
        );
      })()}

      {/* ── VERSION FOOTER ── */}
      <div style={{ padding:"18px 14px 24px", textAlign:"center", borderTop:"1px solid #0f0f1a", marginTop:8 }}>
        <span style={{ fontSize:9, color:"#1e1e2e", letterSpacing:2, userSelect:"none" }}>
          FANTASY F1 2026 · DRAFT ROOM · v1.0.1
        </span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
